# GitHub Actions iş akışı — repoda .github/workflows/roboter.yml yoluna konacak.
# Her 30 dakikada bir robotu çalıştırır, değişiklik varsa nachrichten.json'u yayınlar.
name: Nachrichten-Roboter

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  schreiben:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install feedparser

      - run: python roboter.py
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}

      - name: Yayınla
        run: |
          git config user.name "roboter"
          git config user.email "roboter@users.noreply.github.com"
          git add nachrichten.json
          git diff --cached --quiet || git commit -m "Nachrichten aktualisiert"
          git push
